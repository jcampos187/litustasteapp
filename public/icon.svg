<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15803D"/>
      <stop offset="100%" style="stop-color:#0A5C36"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDFBF7"/>
      <stop offset="100%" style="stop-color:#F5F0E8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Bowl shape -->
  <path d="M128 240 C128 160, 384 160, 384 240 L368 360 C368 400, 144 400, 144 360 Z" fill="url(#bowl)" opacity="0.95"/>
  <!-- Bowl rim -->
  <ellipse cx="256" cy="240" rx="128" ry="28" fill="none" stroke="#D4652F" stroke-width="6" opacity="0.6"/>
  <!-- Steam lines -->
  <path d="M200 160 Q210 130 200 100" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M256 150 Q266 120 256 90" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <path d="M312 160 Q322 130 312 100" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Small leaves for freshness -->
  <ellipse cx="220" cy="210" rx="10" ry="6" fill="#86EFAD" transform="rotate(-30 220 210)" opacity="0.8"/>
  <ellipse cx="280" cy="218" rx="8" ry="5" fill="#86EFAD" transform="rotate(20 280 218)" opacity="0.7"/>
  <!-- Litus Taste text initials "LT" -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#3D2E24" opacity="0.25">LT</text>
</svg>
